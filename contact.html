<!DOCTYPE html>
<html>
<head>
<title>GreenWorld - Contact</title>

<style>

/* Reset */
*{
margin:0;
padding:0;
box-sizing:border-box;
}

/* Background */
body{
font-family: Arial, sans-serif;
background: linear-gradient(120deg,#e8f5e9,#c8e6c9,#b2dfdb,#dcedc8,#e0f7fa);
background-size:400% 400%;
animation: plantBG 12s ease infinite;
color:#2e2e2e;
min-height:100vh;
}

/* Animation */
@keyframes plantBG{
0%{background-position:0% 50%;}
50%{background-position:100% 50%;}
100%{background-position:0% 50%;}
}

/* Header */
header{
background: linear-gradient(to right,#2e7d32,#43a047);
color:white;
padding:20px;
text-align:center;
}

/* Navigation */
nav a{
color:white;
text-decoration:none;
margin:0 12px;
padding:8px 14px;
border-radius:6px;
}

nav a:hover{
background:white;
color:#2e7d32;
}

/* Section */
section{
text-align:center;
padding:50px 20px;
}

h2{
color:#2e7d32;
margin-bottom:15px;
}

/* Video */
iframe{
border-radius:15px;
box-shadow:0 8px 20px rgba(0,0,0,0.1);
margin-top:15px;
}

/* Feedback Form */
form{
background:white;
width:360px;
margin:30px auto;
padding:25px;
border-radius:12px;
box-shadow:0 6px 15px rgba(0,0,0,0.08);
text-align:left;
}

input,textarea{
width:100%;
padding:10px;
margin:8px 0 15px;
border-radius:8px;
border:1px solid #a5d6a7;
}

textarea{
height:80px;
}

/* Button */
button{
width:100%;
padding:10px;
background:#43a047;
color:white;
border:none;
border-radius:8px;
cursor:pointer;
}

button:hover{
background:#2e7d32;
}

/* Success Message */
#message{
text-align:center;
color:#2e7d32;
font-weight:bold;
margin-top:15px;
display:none;
}

/* Footer */
footer{
background: linear-gradient(to right,#2e7d32,#43a047);
color:white;
text-align:center;
padding:15px;
margin-top:50px;
}

</style>
</head>

<body>

<header>
<h1>GreenWorld</h1>

<nav>
<a href="indexp.html">Home</a>
<a href="plants.html">Plants</a>
<a href="care.html">Plant Care</a>
<a href="contact.html">Contact</a>
</nav>

</header>


<section>

<h2>Contact Us</h2>

<p>Email: greenworld@email.com</p>

<h3>Plants Growth Video</h3>

<iframe width="420" height="236"
src="https://www.youtube.com/embed/wY8DMF8nlw0"
frameborder="0" allowfullscreen>
</iframe>


<!-- Feedback Form -->

<form onsubmit="showMessage(); return false;">

<h3>Feedback Form</h3>

Name:
<input type="text" required>

Email:
<input type="email" required>

Your Feedback:
<textarea required></textarea>

<button type="submit">Submit Feedback</button>

<p id="message">🌿 Thanks for your feedback!</p>

</form>

</section>


<footer>
<p>© 2026 GreenWorld</p>
</footer>


<script>

function showMessage(){
document.getElementById("message").style.display="block";
}

</script>

</body>
</html>
